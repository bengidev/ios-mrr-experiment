name: iOS Tests and Coverage

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-with-coverage:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift package dependencies
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project "MRR Project.xcodeproj" \
            -scheme "MRR Project"

      - name: Run unit tests with code coverage
        run: ./scripts/run-tests-with-coverage.sh

      - name: Upload xcresult and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ios-test-coverage-artifacts
          path: |
            ci_artifacts/coverage
            ci_artifacts/test-results
          if-no-files-found: warn

      - name: Verify Codecov token is configured
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          if [ -z "$CODECOV_TOKEN" ]; then
            echo "::error::CODECOV_TOKEN secret is missing. Add it to GitHub Actions secrets so coverage can be uploaded to Codecov and the README badge can update."
            exit 1
          fi

      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v5
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./ci_artifacts/coverage/cobertura.xml
          flags: ios-unit-tests
          name: ios-mrr-experiment
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
