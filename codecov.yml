codecov:
  require_ci_to_pass: true

coverage:
  precision: 1
  round: down
  range: "50...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
        if_ci_failed: error
        informational: false
        only_pulls: false
    patch:
      default:
        target: auto
        threshold: 0%
        if_ci_failed: error
        informational: false
        only_pulls: false

github_checks:
  annotations: true
